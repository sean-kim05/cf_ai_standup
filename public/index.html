<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standup Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --accent: #4f8ef7;
      --accent-hover: #6ba3ff;
      --text: #e6edf3;
      --text2: #8b949e;
      --success: #3fb950;
      --error: #f85149;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: var(--text2); margin-top: 1px; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      gap: 24px;
    }

    /* Main */
    .main { display: flex; flex-direction: column; gap: 20px; }

    .date-header {
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
    }
    .date-header span { color: var(--text); font-weight: 600; }

    .input-group { display: flex; flex-direction: column; gap: 8px; }

    label { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

    textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      min-height: 140px;
      transition: border-color 0.15s;
      width: 100%;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea.error { border-color: var(--error); }
    textarea::placeholder { color: var(--text2); }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .char-count { font-size: 12px; color: var(--text2); }
    .char-count.warn { color: var(--error); }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      display: none;
    }
    .error-msg.visible { display: block; }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text2); }

    /* Spinner */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .result-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .result-card.visible { display: flex; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

    .copy-btn {
      padding: 5px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--text2); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    .result-text {
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--text);
    }

    .result-text .line-label {
      color: var(--accent);
      font-weight: 600;
    }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--accent); }

    .history-date {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .history-preview {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      white-space: pre-wrap;
    }

    .history-empty {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      padding: 20px;
      background: var(--bg2);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    .today-badge {
      display: inline-block;
      background: color-mix(in srgb, var(--success) 15%, transparent);
      color: var(--success);
      border: 1px solid color-mix(in srgb, var(--success) 40%, transparent);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: 6px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 16px; font-weight: 700; }

    .modal-close {
      background: transparent; border: none;
      color: var(--text2); font-size: 20px; cursor: pointer;
      line-height: 1; padding: 2px 6px; border-radius: 4px;
    }
    .modal-close:hover { color: var(--text); background: var(--bg3); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body p { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }

    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end;
    }

    /* Responsive */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; padding: 20px 16px; }
      .sidebar { order: -1; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">📋</div>
  <div>
    <h1>Standup Bot</h1>
    <p>AI-powered daily standups</p>
  </div>
</header>

<div class="layout">
  <div class="main">
    <div class="date-header">
      Today is <span id="todayDate"></span>
    </div>

    <div class="input-group">
      <label for="standup-input">What did you work on?</label>
      <textarea
        id="standup-input"
        placeholder="e.g. Fixed the login bug, reviewed two PRs, will work on the dashboard feature today, blocked on API access..."
        maxlength="2000"
      ></textarea>
      <div class="input-footer">
        <span class="error-msg" id="emptyError">Please enter what you worked on before generating.</span>
        <span class="char-count" id="charCount">0 / 2000</span>
      </div>
    </div>

    <div>
      <button class="btn btn-primary" id="generateBtn" onclick="generateStandup()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Generate Standup
      </button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="result-title">Your Standup</span>
        <button class="copy-btn" id="copyBtn" onclick="copyStandup()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
      </div>
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">History</span>
      <button class="btn btn-ghost" id="weeklyBtn" onclick="generateWeekly()" style="padding:6px 12px;font-size:12px;">
        Weekly Summary
      </button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No standups yet.<br/>Generate your first one!</div>
    </div>
  </div>
</div>

<!-- Weekly summary modal -->
<div class="modal-overlay" id="weeklyModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Weekly Summary</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p id="weeklySummaryText"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  // Config — update to deployed worker URL for production
  const API_URL = 'https://cf-ai-standup.skim8705.workers.dev';

  // User ID persisted in localStorage
  let userId = localStorage.getItem('standup_user_id');
  if (!userId) {
    userId = 'user-' + crypto.randomUUID();
    localStorage.setItem('standup_user_id', userId);
  }

  const today = new Date().toISOString().split('T')[0];

  // Init
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
  });

  const textarea = document.getElementById('standup-input');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    charCount.textContent = `${len} / 2000`;
    charCount.classList.toggle('warn', len > 1800);
    if (len > 0) {
      textarea.classList.remove('error');
      document.getElementById('emptyError').classList.remove('visible');
    }
  });

  loadHistory();

  async function generateStandup() {
    const message = textarea.value.trim();
    if (!message) {
      textarea.classList.add('error');
      document.getElementById('emptyError').classList.add('visible');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Generating…';

    try {
      const res = await fetch(`${API_URL}/api/standup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, message }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const data = await res.json();
      showResult(data.summary);
      await loadHistory();
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Generate Standup`;
    }
  }

  function showResult(summary) {
    const card = document.getElementById('resultCard');
    const text = document.getElementById('resultText');
    // Highlight the labels
    const highlighted = summary.replace(
      /^(Yesterday:|Today:|Blockers:)/gm,
      '<span class="line-label">$1</span>'
    );
    text.innerHTML = highlighted;
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyStandup() {
    const text = document.getElementById('resultText').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API_URL}/api/history/${encodeURIComponent(userId)}`);
      if (!res.ok) return;
      const history = await res.json();
      renderHistory(history.reverse()); // newest first
    } catch (err) {
      console.error('Failed to load history', err);
    }
  }

  function renderHistory(history) {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">No standups yet.<br/>Generate your first one!</div>';
      return;
    }

    const hasTodayEntry = history.some(h => h.date === today);

    let html = '';
    if (!hasTodayEntry) {
      html += `<div class="history-empty" style="margin-bottom:4px;">No standup yet today</div>`;
    }

    html += history.map(entry => {
      const isToday = entry.date === today;
      const badge = isToday ? '<span class="today-badge">Today</span>' : '';
      return `
        <div class="history-item" onclick="showHistoryEntry(this)" data-summary="${encodeURIComponent(entry.summary)}">
          <div class="history-date">${formatDate(entry.date)}${badge}</div>
          <div class="history-preview">${escapeHtml(entry.summary)}</div>
        </div>`;
    }).join('');

    list.innerHTML = html;
  }

  function showHistoryEntry(el) {
    const summary = decodeURIComponent(el.getAttribute('data-summary'));
    showResult(summary);
  }

  async function generateWeekly() {
    const btn = document.getElementById('weeklyBtn');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    try {
      const res = await fetch(`${API_URL}/api/weekly/${encodeURIComponent(userId)}`, {
        method: 'POST',
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const data = await res.json();
      document.getElementById('weeklySummaryText').textContent = data.summary;
      document.getElementById('weeklyModal').classList.add('visible');
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Weekly Summary';
    }
  }

  function closeModal() {
    document.getElementById('weeklyModal').classList.remove('visible');
  }

  document.getElementById('weeklyModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
