<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Briefly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: #1f1f1f;
      --border2: #2a2a2a;
      --accent: #f97316;
      --accent-hover: #ea6c0a;
      --text: #ededed;
      --text2: #555;
      --text3: #333;
      --success: #22c55e;
      --error: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 9px; }

    .header-icon {
      color: var(--accent);
      display: flex;
      align-items: center;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-date {
      font-size: 12px;
      color: var(--text2);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 32px 80px;
      gap: 0;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-right: 40px;
    }

    .input-wrap { position: relative; }

    textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      line-height: 1.7;
      padding: 14px 14px 36px;
      resize: vertical;
      min-height: 160px;
      transition: border-color 0.15s;
      width: 100%;
    }
    textarea:focus { outline: none; border-color: var(--border2); }
    textarea.error { border-color: var(--error); }
    textarea::placeholder { color: var(--text3); }

    .input-meta {
      position: absolute;
      bottom: 10px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      display: none;
    }
    .error-msg.visible { display: block; }

    .char-count {
      font-size: 11px;
      color: var(--text3);
      margin-left: auto;
    }
    .char-count.warn { color: var(--error); }

    .btn {
      padding: 9px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
    .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      width: 13px; height: 13px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }
    .result-card.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .copy-btn {
      padding: 3px 9px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text2);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--border2); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    .result-body { padding: 18px; }

    .result-text {
      font-size: 14px;
      line-height: 1.85;
      white-space: pre-wrap;
      color: var(--text);
    }
    .result-text .line-label {
      color: var(--accent);
      font-weight: 600;
    }

    /* Sidebar */
    .sidebar {
      border-left: 1px solid var(--border);
      padding-left: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .history-list { display: flex; flex-direction: column; }

    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { opacity: 0.65; }

    .history-date {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-preview {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .history-empty {
      font-size: 12px;
      color: var(--text3);
      padding: 4px 0;
    }

    .today-badge {
      display: inline-flex;
      align-items: center;
      background: color-mix(in srgb, var(--success) 10%, transparent);
      color: var(--success);
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      width: 100%;
      max-width: 520px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 100px rgba(0,0,0,0.9);
      animation: fadeUp 0.15s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }

    .modal-close {
      background: transparent; border: none;
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center;
      padding: 3px; border-radius: 4px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-body p {
      font-size: 14px;
      line-height: 1.85;
      white-space: pre-wrap;
      color: var(--text2);
    }

    .modal-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end;
    }

    /* Status bar */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 8px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: var(--text3);
      background: var(--bg);
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }

    @media (max-width: 720px) {
      header { padding: 14px 20px; }
      .layout { grid-template-columns: 1fr; padding: 28px 20px 80px; }
      .main { padding-right: 0; }
      .sidebar { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 28px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <h1>Briefly</h1>
  </div>
  <span class="header-date" id="headerDate"></span>
</header>

<div class="layout">
  <div class="main">
    <div class="input-wrap">
      <textarea
        id="standup-input"
        placeholder="What did you work on? Paste tasks, commits, or notes — AI will format your standup."
        maxlength="2000"
      ></textarea>
      <div class="input-meta">
        <span class="error-msg" id="emptyError">Please enter something before generating.</span>
        <span class="char-count" id="charCount">0 / 2000</span>
      </div>
    </div>

    <div>
      <button class="btn btn-primary" id="generateBtn" onclick="generateStandup()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Generate Standup
      </button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="result-label">Generated Standup</span>
        <button class="copy-btn" id="copyBtn" onclick="copyStandup()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
      </div>
      <div class="result-body">
        <div class="result-text" id="resultText"></div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">History</span>
      <button class="btn btn-ghost" id="weeklyBtn" onclick="generateWeekly()" style="padding:5px 11px;font-size:12px;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Weekly
      </button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No standups yet</div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span><span class="status-dot"></span>Worker online</span>
  <span>Durable Object · persistent memory</span>
  <span id="standupCount">0 standups logged</span>
</div>

<div class="modal-overlay" id="weeklyModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Weekly Summary</span>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p id="weeklySummaryText"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://cf-ai-standup.skim8705.workers.dev';

  let userId = localStorage.getItem('standup_user_id');
  if (!userId) {
    userId = 'user-' + crypto.randomUUID();
    localStorage.setItem('standup_user_id', userId);
  }

  const today = new Date().toISOString().split('T')[0];

  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
  });

  const textarea = document.getElementById('standup-input');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    charCount.textContent = `${len} / 2000`;
    charCount.classList.toggle('warn', len > 1800);
    if (len > 0) {
      textarea.classList.remove('error');
      document.getElementById('emptyError').classList.remove('visible');
    }
  });

  loadHistory();

  async function generateStandup() {
    const message = textarea.value.trim();
    if (!message) {
      textarea.classList.add('error');
      document.getElementById('emptyError').classList.add('visible');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Generating…';

    try {
      const res = await fetch(`${API_URL}/api/standup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, message }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const data = await res.json();
      showResult(data.summary);
      await loadHistory();
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Generate Standup`;
    }
  }

  function showResult(summary) {
    const card = document.getElementById('resultCard');
    const text = document.getElementById('resultText');
    const highlighted = summary.replace(
      /^(Yesterday:|Today:|Blockers:)/gm,
      '<span class="line-label">$1</span>'
    );
    text.innerHTML = highlighted;
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyStandup() {
    const text = document.getElementById('resultText').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API_URL}/api/history/${encodeURIComponent(userId)}`);
      if (!res.ok) return;
      const history = await res.json();
      renderHistory(history.reverse());
    } catch (err) {
      console.error('Failed to load history', err);
    }
  }

  function renderHistory(history) {
    const list = document.getElementById('historyList');
    document.getElementById('standupCount').textContent = `${history.length} standup${history.length !== 1 ? 's' : ''} logged`;

    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">No standups yet</div>';
      return;
    }

    const hasTodayEntry = history.some(h => h.date === today);
    let html = '';

    if (!hasTodayEntry) {
      html += `<div class="history-empty" style="padding:12px 0;border-bottom:1px solid var(--border);">No standup yet today</div>`;
    }

    html += history.map(entry => {
      const isToday = entry.date === today;
      const badge = isToday ? '<span class="today-badge">Today</span>' : '';
      return `
        <div class="history-item" onclick="showHistoryEntry(this)" data-summary="${encodeURIComponent(entry.summary)}">
          <div class="history-date">${formatDate(entry.date)}${badge}</div>
          <div class="history-preview">${escapeHtml(entry.summary)}</div>
        </div>`;
    }).join('');

    list.innerHTML = html;
  }

  function showHistoryEntry(el) {
    const summary = decodeURIComponent(el.getAttribute('data-summary'));
    showResult(summary);
  }

  async function generateWeekly() {
    const btn = document.getElementById('weeklyBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="border-top-color:var(--text2)"></div>';

    try {
      const res = await fetch(`${API_URL}/api/weekly/${encodeURIComponent(userId)}`, {
        method: 'POST',
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const data = await res.json();
      document.getElementById('weeklySummaryText').textContent = data.summary;
      document.getElementById('weeklyModal').classList.add('visible');
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Weekly`;
    }
  }

  function closeModal() {
    document.getElementById('weeklyModal').classList.remove('visible');
  }

  document.getElementById('weeklyModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
